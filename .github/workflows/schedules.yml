name: update awesome-stars
on:
  workflow_dispatch:
  schedule:
  - cron: 30 0 * * *
jobs:
  awesome-stars:
    name: update awesome-stars
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install starred
    - name: update repo category by language
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        USERNAME: ${{ github.repository_owner }}
      run: |
        starred --username ${USERNAME} --sort --token ${GITHUB_TOKEN} > README.md
        if ! head -n 1 README.md | grep -q "^<!--lint"; then
          echo "starred failed or output format changed:"
          cat README.md
          exit 1
        fi
    - name: update repo category by topic
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        USERNAME: ${{ github.repository_owner }}
      run: |
        starred --username ${USERNAME} --sort --token ${GITHUB_TOKEN} --topic --topic_limit 500 > topics.md
        if ! head -n 1 topics.md | grep -q "^<!--lint"; then
          echo "starred failed or output format changed:"
          cat topics.md
          exit 1
        fi
    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add README.md topics.md
        git diff --staged --quiet || git commit -m "awesome-stars update by github actions cron"
        git push
